    <div class="flex flex-col items-center">
      <div 
        class="z-50 w-fit flex flex-col items-center pb-3 bg-cyan-950/20  border border-zinc-700 rounded-2xl shadow-[0px_0px_13px_13px_rgba(59,72,79,0.3)]"
